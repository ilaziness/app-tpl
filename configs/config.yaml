# Application configuration
app:
  name: app-tpl
  version: 1.0.0
  env: dev

# HTTP server configuration
http:
  enabled: true
  host: 0.0.0.0
  port: 8080
  read_timeout: 30
  write_timeout: 30
  shutdown_timeout: 30
  # internal_service_key: set via HTTP_INTERNAL_SERVICE_KEY in production
  tls:
    enabled: false
    cert_file: configs/cert.pem
    key_file: configs/key.pem
    min_version: "1.3"

# Logging configuration
log:
  level: debug
  format: console
  output: stdout
  filename: logs/app.log
  max_size: 100
  max_backups: 30
  max_age: 7
  compress: true

# Database configuration (required, SQLite example)
database:
  driver: sqlite
  database: ./data/app.db
  max_open_conns: 25
  max_idle_conns: 10
  conn_max_lifetime: 300
  conn_max_idle_time: 60

# Redis configuration (disabled by default)
redis:
  enabled: false
  host: localhost
  port: 6379
  password: ""
  db: 0
  pool_size: 50
  min_idle_conns: 5
  idle_timeout: 300
  idle_check_frequency: 60

# JWT configuration
# jwt.secret should be set via JWT_SECRET environment variable in production
jwt:
  access_token_ttl: 7200   # 2 hours in seconds
  refresh_token_ttl: 604800 # 7 days in seconds
  skip_paths:
    - /health
    - /readiness
    - /liveness
    - /version
    - /swagger/*any

# Rate limiting configuration (disabled by default)
rate_limit:
  enabled: false
  store: memory  # memory or redis
  global_rps: 10000
  ip_rps: 100
  user_rps: 50

# Cache configuration (disabled by default)
cache:
  enabled: false
  driver: memory  # memory, redis, multi
  memory:
    num_counters: 1000000
    max_cost: 1073741824  # 1GB
    buffer_items: 64
  redis:
    key_prefix: "app:"
    default_ttl: 3600 # 1 hour in seconds

# TCP server configuration (disabled by default)
tcp:
  enabled: false
  host: 0.0.0.0
  port: 9000
  read_timeout: 30
  write_timeout: 30
  heartbeat_interval: 30
  heartbeat_timeout: 90
  shutdown_timeout: 30
  codec: json  # json or binary
  max_connections: 10000
  max_timeout_count: 10  # consecutive timeouts before closing connection

# UDP server configuration (disabled by default)
udp:
  enabled: false
  host: 0.0.0.0
  port: 9001
  read_buffer_size: 4096
  write_buffer_size: 4096
  shutdown_timeout: 30
  codec: json  # json or binary
  worker_pool_size: 100
  session_cleanup_interval: 300  # seconds (5 minutes)
  session_inactive_threshold: 600  # seconds (10 minutes)

# Tracing configuration (disabled by default)
# Uses OTLP protocol (Jaeger, Tempo, and other backends support OTLP)
tracing:
  enabled: false
  endpoint: localhost:4317  # OTLP gRPC endpoint (e.g., Jaeger collector at localhost:4317)
  sample_rate: 1.0  # 采样率，1.0 表示全采样

# Metrics configuration (disabled by default)
metrics:
  enabled: false
  path: /metrics
  labels:
    env: dev
    version: "1.0.0"
